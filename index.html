<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Rogue-Lite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }
        #stats-bar {
            height: 40px;
            background: #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            border-bottom: 2px solid #333;
        }
        #canvas-container {
            flex: 1;
            position: relative;
            background: #15151c;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #upgrade-panel {
            height: 110px;
            background: #1a1a1a;
            border-top: 2px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
        }
        .upgrade-btn {
            flex: 1;
            margin: 0 5px;
            height: 100%;
            background: linear-gradient(145deg, #2a2a35, #22222b);
            border: 1px solid #444;
            border-radius: 12px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .upgrade-btn:active {
            transform: scale(0.95);
            background: #333344;
        }
        .upgrade-btn .cost {
            color: #ffd700;
            margin-top: 4px;
            font-size: 13px;
        }
        .upgrade-btn .lvl {
            color: #888;
            font-size: 9px;
            margin-top: 2px;
        }
        #joystick-zone {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 50%;
            pointer-events: none;
            display: none; /* Динамический джойстик */
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats-bar">
        <div>💰 Монеты: <span id="coin-count">0</span></div>
        <div>⏱️ Волна: <span id="wave-count">1</span></div>
        <div>❤️ ХП: <span id="hp-count">100/100</span></div>
    </div>

    <div id="canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="upgrade-panel">
        <div class="upgrade-btn" onclick="buyUpgrade('damage')">
            <span>⚔️ Урон</span>
            <span class="cost" id="cost-damage">10 💰</span>
            <span class="lvl" id="lvl-damage">Ур. 1</span>
        </div>
        <div class="upgrade-btn" onclick="buyUpgrade('speed')">
            <span>⚡ Скорость</span>
            <span class="cost" id="cost-speed">15 💰</span>
            <span class="lvl" id="lvl-speed">Ур. 1</span>
        </div>
        <div class="upgrade-btn" onclick="buyUpgrade('income')">
            <span>🪙 Доход</span>
            <span class="cost" id="cost-income">20 💰</span>
            <span class="lvl" id="lvl-income">Ур. 1</span>
        </div>
    </div>
</div>

<script>
    // Инициализация Telegram WebApp
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
    }

    // Триггер вибрации (Haptic Feedback)
    function triggerHaptic(type = 'light') {
        if (tg && tg.HapticFeedback) {
            if (type === 'light') tg.HapticFeedback.impactOccurred('light');
            if (type === 'medium') tg.HapticFeedback.impactOccurred('medium');
            if (type === 'heavy') tg.HapticFeedback.impactOccurred('heavy');
            if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
        }
    }

    // --- ЗВУКОВОЙ ДВИЖОК (Web Audio API) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'shoot') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'hit') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, now);
            osc.frequency.linearRampToValueAtTime(40, now + 0.08);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
            osc.start(now);
            osc.stop(now + 0.08);
        } else if (type === 'coin') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.setValueAtTime(1200, now + 0.05);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
        } else if (type === 'upgrade') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(900, now + 0.3);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        }
    }

    // Процедурный Synth-Саундтрек (Арпеджио в фоне)
    let synthInterval;
    function startBackgroundMusic() {
        if (synthInterval) return;
        let notes = [110, 130, 146, 165, 196, 165, 146, 130]; // Мрачный минорный перебор
        let step = 0;
        
        synthInterval = setInterval(() => {
            if (audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sawtooth';
            // Делаем звук мягче фильтром низких частот
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400;
            osc.disconnect(gain);
            osc.connect(filter);
            filter.connect(gain);

            osc.frequency.setValueAtTime(notes[step % notes.length], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
            step++;
        }, 250); // Темп
    }

    // --- НАСТРОЙКИ И СОСТОЯНИЕ ИГРЫ ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let player = {
        x: 0, y: 0, r: 14,
        speed: 2.5, maxHp: 100, hp: 100,
        damage: 15, incomeMultiplier: 1,
        shootCooldown: 0, baseShootCooldown: 25 // кадры
    };

    let upgrades = {
        damage: { lvl: 1, cost: 10 },
        speed: { lvl: 1, cost: 15 },
        income: { lvl: 1, cost: 20 }
    };

    let coins = 0;
    let wave = 1;
    let waveTimer = 0;
    let enemies = [];
    let bullets = [];
    let particles = [];
    let screenShake = 0;

    // Управление джойстиком
    let joystick = { active: false, startX: 0, startY: 0, curX: 0, curY: 0, vx: 0, vy: 0 };

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        if(player.x === 0) {
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
        }
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- ОБРАБОТКА КАСАНИЙ (ДЖОЙСТИК) ---
    window.addEventListener('touchstart', (e) => {
        if (e.target.closest('#upgrade-panel') || e.target.closest('#stats-bar')) return;
        audioCtx.resume();
        startBackgroundMusic();

        const touch = e.touches[0];
        joystick.active = true;
        joystick.startX = touch.clientX;
        joystick.startY = touch.clientY;
        joystick.curX = touch.clientX;
        joystick.curY = touch.clientY;
    });

    window.addEventListener('touchmove', (e) => {
        if (!joystick.active) return;
        const touch = e.touches[0];
        joystick.curX = touch.clientX;
        joystick.curY = touch.clientY;

        let dx = joystick.curX - joystick.startX;
        let dy = joystick.curY - joystick.startY;
        let dist = Math.sqrt(dx*dx + dy*dy);
        let maxDist = 50;

        if (dist > maxDist) {
            dx = (dx / dist) * maxDist;
            dy = (dy / dist) * maxDist;
        }
        joystick.vx = dx / maxDist;
        joystick.vy = dy / maxDist;
    });

    window.addEventListener('touchend', () => {
        joystick.active = false;
        joystick.vx = 0;
        joystick.vy = 0;
    });

    // --- УЛУЧШЕНИЯ ---
    function buyUpgrade(type) {
        let upg = upgrades[type];
        if (coins >= upg.cost) {
            coins -= upg.cost;
            upg.lvl++;
            upg.cost = Math.floor(upg.cost * 1.6); // Экспоненциальная цена

            if (type === 'damage') player.damage += 8;
            if (type === 'speed') player.speed += 0.4;
            if (type === 'income') player.incomeMultiplier += 0.5;

            playSound('upgrade');
            triggerHaptic('success');
            updateUI();
        } else {
            triggerHaptic('heavy'); // Ошибка — не хватает денег
        }
    }

    function updateUI() {
        document.getElementById('coin-count').innerText = Math.floor(coins);
        document.getElementById('wave-count').innerText = wave;
        document.getElementById('hp-count').innerText = `${Math.max(0, Math.floor(player.hp))}/${player.maxHp}`;
        
        // Кнопки
        for (let key in upgrades) {
            document.getElementById(`cost-${key}`).innerText = upgrades[key].cost + ' 💰';
            document.getElementById(`lvl-${key}`).innerText = 'Ур. ' + upgrades[key].lvl;
        }
    }

    // Эффект частиц (взрывы, кровь)
    function spawnParticles(x, y, color, count=5) {
        for(let i=0; i<count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                r: Math.random() * 3 + 2,
                alpha: 1,
                color: color
            });
        }
    }

    // Поиск ближайшего врага
    function getClosestEnemy() {
        let minDist = Infinity;
        let closest = null;
        enemies.forEach(e => {
            let d = Math.hypot(e.x - player.x, e.y - player.y);
            if (d < minDist) {
                minDist = d;
                closest = e;
            }
        });
        return closest;
    }

    // --- ИГРОВОЙ ЦИКЛ ---
    function update() {
        // Эффект тряски экрана
        if (screenShake > 0) screenShake -= 0.1;

        // Движение игрока
        if (joystick.active) {
            player.x += joystick.vx * player.speed;
            player.y += joystick.vy * player.speed;
            
            // Ограничения экрана
            player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
            player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));
        }

        // Автострельба по ближайшему врагу
        if (player.shootCooldown > 0) player.shootCooldown--;
        if (player.shootCooldown === 0 && enemies.length > 0) {
            let target = getClosestEnemy();
            if (target) {
                let angle = Math.atan2(target.y - player.y, target.x - player.x);
                bullets.push({
                    x: player.x, y: player.y,
                    vx: Math.cos(angle) * 7, vy: Math.sin(angle) * 7,
                    r: 4, damage: player.damage
                });
                player.shootCooldown = player.baseShootCooldown;
                playSound('shoot');
            }
        }

        // Спавн врагов волнами
        waveTimer++;
        if (waveTimer % Math.max(20, 100 - wave * 5) === 0) {
            // Спавн за пределами экрана
            let angle = Math.random() * Math.PI * 2;
            let spawnDist = Math.max(canvas.width, canvas.height) / 2 + 20;
            let ex = player.x + Math.cos(angle) * spawnDist;
            let ey = player.y + Math.sin(angle) * spawnDist;
            
            // Рост силы врагов с волной
            enemies.push({
                x: ex, y: ey,
                r: 10 + Math.random()*4,
                hp: 20 + wave * 10,
                speed: 1.2 + Math.min(2, wave * 0.1),
                color: `hsl(${Math.max(0, 360 - wave*15)}, 80%, 50%)`
            });
        }

        // Сложность растет каждые 20 секунд
        if (waveTimer > 1200) {
            wave++;
            waveTimer = 0;
            triggerHaptic('medium');
            updateUI();
        }

        // Обновление пуль
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.x += b.vx;
            b.y += b.vy;

            // Вылет за экран
            if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                bullets.splice(i, 1);
                continue;
            }

            // Коллизии с врагами
            for (let j = enemies.length - 1; j >= 0; j--) {
                let e = enemies[j];
                if (Math.hypot(b.x - e.x, b.y - e.y) < b.r + e.r) {
                    e.hp -= b.damage;
                    spawnParticles(b.x, b.y, '#ff4444', 3);
                    bullets.splice(i, 1);
                    playSound('hit');
                    
                    if (e.hp <= 0) {
                        let reward = (5 + wave * 2) * player.incomeMultiplier;
                        coins += reward;
                        spawnParticles(e.x, e.y, '#ffd700', 8);
                        enemies.splice(j, 1);
                        playSound('coin');
                        triggerHaptic('light');
                        updateUI();
                    }
                    break;
                }
            }
        }

        // Обновление врагов
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            let angle = Math.atan2(player.y - e.y, player.x - e.x);
            
            // Движение к игроку
            e.x += Math.cos(angle) * e.speed;
            e.y += Math.sin(angle) * e.speed;

            // Аттака игрока
            if (Math.hypot(player.x - e.x, player.y - e.y) < player.r + e.r) {
                player.hp -= 0.5; // Урон каждый кадр при контакте
                screenShake = 3;
                if (Math.random() < 0.1) triggerHaptic('medium');
                updateUI();

                if (player.hp <= 0) {
                    triggerHaptic('heavy');
                    alert(`Игра окончена! Вы дожили до ${wave} волны.`);
                    // Рестарт
                    player.hp = player.maxHp;
                    coins = 0;
                    wave = 1;
                    waveTimer = 0;
                    enemies = [];
                    bullets = [];
                    updateUI();
                }
            }
        }

        // Частицы
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.alpha -= 0.02;
            if (p.alpha <= 0) particles.splice(i, 1);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        // Рендеринг тряски экрана
        if (screenShake > 0) {
            let dx = (Math.random() - 0.5) * screenShake;
            let dy = (Math.random() - 0.5) * screenShake;
            ctx.translate(dx, dy);
        }

        // Сетка фона (для ощущения движения)
        ctx.strokeStyle = '#222230';
        ctx.lineWidth = 1;
        let gridSize = 40;
        for (let x = 0; x < canvas.width; x += gridSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        // Рисуем частицы
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.alpha;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        // Рисуем пули
        ctx.fillStyle = '#00ffff';
        bullets.forEach(b => {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
            ctx.fill();
        });

        // Рисуем врагов
        enemies.forEach(e => {
            ctx.fillStyle = e.color;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
            ctx.fill();
            
            // Глаза врагам для стиля
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(e.x - 3, e.y - 2, 2, 0, Math.PI*2);
            ctx.arc(e.x + 3, e.y - 2, 2, 0, Math.PI*2);
            ctx.fill();
        });

        // Рисуем игрока
        ctx.fillStyle = '#39ff14'; // Неоново-зеленый
        ctx.shadowColor = '#39ff14';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0; // Сброс тени

        // Направление взгляда / Оружие игрока
        let target = getClosestEnemy();
        if (target) {
            let angle = Math.atan2(target.y - player.y, target.x - player.x);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x + Math.cos(angle)*20, player.y + Math.sin(angle)*20);
            ctx.stroke();
        }

        // Индикатор виртуального джойстика (где коснулся палец)
        if (joystick.active) {
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(joystick.startX, joystick.startY, 40, 0, Math.PI*2);
            ctx.stroke();

            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(joystick.curX, joystick.curY, 15, 0, Math.PI*2);
            ctx.fill();
        }

        ctx.restore();
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    // Старт
    updateUI();
    loop();
</script>
</body>
</html>
